<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Debda Tournament</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen text-slate-100">
    <header class="site-header">
      <div
        class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-5"
      >
        <div>
          <p class="eyebrow">
            Dead by Daylight Turnier
          </p>
          <h1 class="text-3xl font-black tracking-wide">Debda</h1>
        </div>
        <div class="flex items-center gap-3">
          <button id="openRules" class="btn btn-secondary" type="button">Rules</button>
          <button id="openStaff" class="btn btn-secondary" type="button">Staff</button>
          <button id="openTeams" class="btn btn-primary" type="button">Teams</button>
        </div>
      </div>
    </header>

    <main
      class="mx-auto grid max-w-6xl gap-6 px-4 py-8 lg:grid-cols-[1.45fr_1fr]"
    >
      <section class="panel">
        <div class="mb-5 flex flex-wrap items-center justify-between gap-4">
          <div>
            <p class="section-label">Matches</p>
            <h2 class="text-xl font-bold">Game Days</h2>
          </div>
          <button id="resetScores" class="btn btn-secondary" type="button">
            Reset Scores
          </button>
        </div>
        <div id="gameDaysList" class="game-days-list"></div>
      </section>

      <section class="panel lg:sticky lg:top-6 lg:self-start">
        <div class="mb-5 flex items-center justify-between gap-4">
          <div>
            <p class="section-label">Scoreboard</p>
            <h2 class="text-xl font-bold">Table</h2>
          </div>
        </div>
        <div id="standingsTable"></div>
      </section>
    </main>

    <dialog
      id="teamsModal"
      class="modal w-full max-w-3xl p-0 text-slate-100 backdrop:bg-black/70"
    >
      <div
        class="flex items-center justify-between border-b border-slate-800 p-5"
      >
        <h2 class="text-xl font-bold">Teams</h2>
        <button class="btn btn-secondary" type="button" data-close-modal>Close</button>
      </div>
      <div id="teamsList" class="teams-modal-body"></div>
    </dialog>

    <dialog
      id="staffModal"
      class="modal w-full max-w-3xl p-0 text-slate-100 backdrop:bg-black/70"
    >
      <div
        class="flex items-center justify-between border-b border-slate-800 p-5"
      >
        <h2 class="text-xl font-bold">Staff</h2>
        <button class="btn btn-secondary" type="button" data-close-modal>Close</button>
      </div>
      <div id="staffList" class="staff-modal-body"></div>
    </dialog>

    <dialog
      id="rulesModal"
      class="modal w-full max-w-3xl p-0 text-slate-100 backdrop:bg-black/70"
    >
      <div
        class="flex items-center justify-between border-b border-slate-800 p-5"
      >
        <h2 class="text-xl font-bold">Rules</h2>
        <button class="btn btn-secondary" type="button" data-close-modal>Close</button>
      </div>
      <div id="rulesList" class="rules-modal-body"></div>
    </dialog>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
