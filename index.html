<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Debda Turnier</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="border-b border-slate-800 bg-slate-950/80">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between px-4 py-5"
      >
        <div>
          <p class="text-sm uppercase tracking-[0.25em] text-indigo-300">
            Tournament
          </p>
          <h1 class="text-2xl font-bold">Debda</h1>
        </div>
        <button id="openTeams" class="btn btn-secondary">Teams</button>
      </div>
    </header>

    <main
      class="mx-auto grid max-w-6xl gap-6 px-4 py-8 lg:grid-cols-[1.4fr_1fr]"
    >
      <section class="rounded-3xl border border-slate-800 bg-slate-900/50 p-5">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-xl font-bold">Current Lineup</h2>
          <span id="teamCount" class="text-sm text-slate-400"></span>
        </div>
        <div id="lineupGrid" class="grid gap-4 sm:grid-cols-2"></div>
      </section>

      <section class="rounded-3xl border border-slate-800 bg-slate-900/50 p-5">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-xl font-bold">Standings</h2>
          <button id="editStandings" class="btn btn-primary">Edit</button>
        </div>
        <div id="standingsTable"></div>
      </section>
    </main>

    <dialog
      id="teamsModal"
      class="w-full max-w-3xl rounded-3xl border border-slate-700 bg-slate-950 p-0 text-slate-100 backdrop:bg-black/70"
    >
      <div
        class="flex items-center justify-between border-b border-slate-800 p-5"
      >
        <h2 class="text-xl font-bold">Teams</h2>
        <button class="btn btn-secondary" data-close-modal>Close</button>
      </div>
      <div id="teamsList" class="grid gap-4 p-5 sm:grid-cols-2"></div>
    </dialog>

    <dialog
      id="standingsModal"
      class="w-full max-w-3xl rounded-3xl border border-slate-700 bg-slate-950 p-0 text-slate-100 backdrop:bg-black/70"
    >
      <form id="standingsForm">
        <div
          class="flex items-center justify-between border-b border-slate-800 p-5"
        >
          <h2 class="text-xl font-bold">Edit standings</h2>
          <button type="button" class="btn btn-secondary" data-close-modal>
            Close
          </button>
        </div>
        <div id="standingsEditor" class="space-y-3 p-5"></div>
        <div class="flex justify-end gap-3 border-t border-slate-800 p-5">
          <button type="button" id="resetData" class="btn btn-secondary">
            Reset
          </button>
          <button type="submit" class="btn btn-primary">Save standings</button>
        </div>
      </form>
    </dialog>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
